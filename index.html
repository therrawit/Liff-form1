<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนหอพัก</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .form-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #06c755; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #05a546; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>📝 ลงทะเบียนเข้าพัก</h2>
        <input id="name" type="text" placeholder="ชื่อ-นามสกุล">
        <input id="phone" type="tel" placeholder="เบอร์โทรศัพท์">
        <input id="room" type="text" placeholder="เลขห้อง">
        <button id="submitBtn" onclick="sendData()">ส่งข้อมูล</button>
    </div>

    <script>
        liff.init({ liffId: "2010383220-0xDJXGNM" }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
        });

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            // ตรวจสอบเบื้องต้น
            if(!document.getElementById('name').value) return alert("กรุณากรอกชื่อครับ");
            
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                const profile = await liff.getProfile();
                const data = new URLSearchParams();
                data.append("name", document.getElementById('name').value);
                data.append("phone", document.getElementById('phone').value);
                data.append("room", document.getElementById('room').value);
                data.append("userId", profile.userId);
                
                await fetch("https://script.google.com/macros/s/AKfycbwwmG1UN9wmrqq2UsAhE-h52vXBnZH3WUK6FzEFrLAEzPqGI4_FQI3XKgbn4q2UuntS/exec", {
                    method: "POST",
                    mode: "no-cors",
                    body: data 
                });
                
                alert("บันทึกข้อมูลเรียบร้อย!");
                liff.closeWindow();
            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error);
                btn.disabled = false;
                btn.innerText = "ส่งข้อมูล";
            }
        }
    </script>
</body>
</html>
