<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนหอพัก</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh;
            /* แทนที่ URL ด้านล่างด้วยลิงก์รูปภาพหอพักของคุณ */
            background: url('https://images.dmc.tv/wallpaper/raw/14177.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
        }
        .form-container { 
            background: rgba(255, 255, 255, 0.9); /* พื้นหลังขาวโปร่งใส */
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 85%; max-width: 400px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #06c755; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>หอพักร่ำรวย</h2>
        <input id="name" type="text" placeholder="ชื่อ-นามสกุล">
        <input id="phone" type="tel" placeholder="เบอร์โทรศัพท์">
        <input id="room" type="text" placeholder="เลขห้อง">
        <button id="submitBtn" onclick="sendData()">ส่งข้อมูล</button>
    </div>

    <script>
        liff.init({ liffId: "2010383220-0xDJXGNM" }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
        });

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            try {
                const profile = await liff.getProfile();
                const data = new URLSearchParams();
                data.append("name", document.getElementById('name').value);
                data.append("phone", document.getElementById('phone').value);
                data.append("room", document.getElementById('room').value);
                data.append("userId", profile.userId);
                
                await fetch("https://script.google.com/macros/s/AKfycbwwmG1UN9wmrqq2UsAhE-h52vXBnZH3WUK6FzEFrLAEzPqGI4_FQI3XKgbn4q2UuntS/exec", {
                    method: "POST", mode: "no-cors", body: data 
                });
                alert("บันทึกข้อมูลเรียบร้อย!");
                liff.closeWindow();
            } catch (error) {
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false; btn.innerText = "ส่งข้อมูล";
            }
        }
    </script>
</body>
</html>
